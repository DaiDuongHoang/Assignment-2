<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Australia Bushfire Visualisation Dashboard</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Pure.css -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/purecss@3.0.0/build/pure-min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/purecss@3.0.0/build/grids-responsive-min.css"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css" />

    <!-- Vega & Vega-Lite & Vega-Embed -->
    <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
  </head>
  <body>
    <div class="page-container">
      <!-- Header -->
      <div class="pure-g">
        <div class="pure-u-1">
          <div class="header-section">
            <h1>🔥 Australian Bushfires</h1>
            <p>
              An interactive dashboard exploring the impact and spread of
              bushfires across Australia.
            </p>
          </div>
        </div>
      </div>

      <!-- Row 1: Fire Hotspot Map (full width) -->
      <div class="pure-g">
        <div class="pure-u-1">
          <div class="viz-container">
            <div id="vis-fire-hotspots"></div>
          </div>
        </div>
      </div>

      <!-- Row 2: Fire History Map (full width) -->
      <div class="pure-g">
        <div class="pure-u-1">
          <div class="viz-container">
            <div id="vis-map"></div>
          </div>
        </div>
      </div>

      <!-- Row 3: Secondary Charts (side by side) -->
      <div class="pure-g">
        <div class="pure-u-1 pure-u-md-1-2">
          <div class="viz-container">
            <div id="vis-bar"></div>
          </div>
        </div>
        <div class="pure-u-1 pure-u-md-1-2">
          <div class="viz-container">
            <div id="vis-timeline"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Main JS for Vega-embed -->
    <script src="js/main.js"></script>
  </body>
</html>
